<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>skolus - socials</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    * { user-select: none; -webkit-user-select: none; }

    :root {
      --bg: #0d0f14;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
      --text: #c8cdd6;
      --muted: #5a6070;
      --accent: #b39ddb;       /* light purple matching index */
      --accent-dim: rgba(179,157,219,0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── Layout ── */
    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 480px;
    }

    /* ── Heading ── */
    .heading {
      font-size: clamp(1.9rem, 5vw, 2.6rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #dde2ec;
      margin-bottom: 0.15em;
    }

    .heading .name {
      color: var(--accent);
      font-weight: 500;
    }

    .sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 2rem;
      letter-spacing: 0.01em;
    }

    /* ── Status Row (Visual echo of clock row) ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 0.5em;
      margin-bottom: 2.5rem;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.7;
      animation: pulse 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.8); }
    }

    .status-text {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    /* ── Section Label ── */
    .section-label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .group + .group {
      margin-top: 1.5rem;
    }

    /* ── Social Items (Matching projects list structure) ── */
    .socials-list {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      position: relative;
    }

    .social-wrap {
      position: relative;
      width: fit-content;
    }

    .social-item {
      display: inline-flex;
      align-items: baseline;
      gap: 0.6em;
      text-decoration: none;
      color: var(--text);
      padding: 0.18rem 0;
      width: fit-content;
      cursor: pointer;
    }

    .social-name {
      font-size: 0.9rem;
      font-weight: 400;
      color: #dde2ec;
      text-decoration: underline;
      text-decoration-color: var(--border);
      text-underline-offset: 3px;
      transition: color 0.15s, text-decoration-color 0.15s;
    }

    .social-item:hover .social-name {
      color: var(--accent);
      text-decoration-color: var(--accent);
    }

    .social-arrow {
      color: var(--muted);
      font-size: 0.8rem;
      transition: color 0.15s;
    }

    .social-item:hover .social-arrow {
      color: var(--accent);
    }

    /* Tooltip/Handle info box matching project-tip style */
    .social-tip {
      position: absolute;
      left: calc(100% + 0.9rem);
      top: 50%;
      transform: translateY(-50%) translateX(-4px);
      background: rgba(20,22,30,0.97);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.8rem;
      width: 180px;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
      white-space: normal;
      z-index: 20;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .social-wrap:hover .social-tip {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
    }

    /* Back navigation link row styling matching index links */
    .nav-links {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .nav-links a {
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      padding: 0.3em 0.85em;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      font-size: 0.82rem;
      transition: border-color 0.18s, color 0.18s, background 0.18s;
    }

    .nav-links a:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .nav-links a svg {
      width: 13px;
      height: 13px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<main>
  <div class="card">
    <h1 class="heading">my <span class="name">socials</span></h1>
    <p class="sub">// where to find me</p>

    <div class="nav-links">
      <a href="https://soggybicycle.github.io">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        back home
      </a>
    </div>

    <div class="group">
      <p class="section-label">twitter / x</p>
      <div class="socials-list">
        <div class="social-wrap">
          <a class="social-item" href="https://twitter.com/skoluss" target="_blank" rel="noopener">
            <span class="social-name">main account</span>
            <span class="social-arrow">↗</span>
          </a>
          <div class="social-tip">@skoluss</div>
        </div>

        <div class="social-wrap">
          <a class="social-item" href="https://twitter.com/JordanGavins" target="_blank" rel="noopener">
            <span class="social-name">alt account</span>
            <span class="social-arrow">↗</span>
          </a>
          <div class="social-tip">@JordanGavins</div>
        </div>
      </div>
    </div>

    <div class="group">
      <p class="section-label">discord</p>
      <div class="socials-list">
        <div class="social-wrap">
          <div class="social-item" onclick="navigator.clipboard.writeText('skolus').then(()=>{const n=this.querySelector('.social-name'); const prev=n.textContent; n.textContent='copied!'; setTimeout(()=>n.textContent=prev,1500)})">
            <span class="social-name">skolus (click to copy)</span>
          </div>
          <div class="social-tip">@skolus</div>
        </div>
      </div>
    </div>

    <footer>
      &copy; 2026 skolus
    </footer>
  </div>
</main>

</body>
</html>
